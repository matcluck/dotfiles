# ─── Behaviour ────────────────────────────────────────────────────────────────

# Enable mouse mode by default (scrolling, pane resizing, selection).
set -g mouse on

# Bigger scrollback – default 2000 is too small for long agent runs.
set -g history-limit 100000

# Windows/panes start at 1 and renumber when one is closed (no gaps).
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Let Claude Code hooks own the window name (see ~/.claude/hooks/tmux-rename.sh).
setw -g automatic-rename off
setw -g allow-rename off

# Bell monitoring – flag windows when an agent rings the bell, and surface
# bells from inactive windows in the status line.
setw -g monitor-bell on
set -g visual-bell off
set -g bell-action other

# Clipboard – drag-to-select-and-copy, double-click word select.
# OSC 52 makes copy work over SSH (alacritty supports it natively).
set -g set-clipboard on
set -as terminal-features ',alacritty*:clipboard'
if-shell '[ -n "$WAYLAND_DISPLAY" ]' \
  'set -g @copy_cmd "wl-copy"' \
  'set -g @copy_cmd "xclip -selection clipboard -in"'
bind -T copy-mode-vi MouseDragEnd1Pane \
  send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"
bind -n DoubleClick1Pane \
  select-pane \; copy-mode -M \; send-keys -X select-word \; \
  send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"

# Reload binding.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# ─── Plugins (tpm) ────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# ─── Catppuccin theme ─────────────────────────────────────────────────────────

set -g @catppuccin_flavor 'mocha'
# 'rounded' uses Nerd Font powerline glyphs – setup.sh installs Hack Nerd Font.
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_default_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_session_icon '🐔️ ' # Matcluck
# Warm the session badge up so the chicken does not sit on neon green.
set -g @catppuccin_session_color '#{?client_prefix,#{E:@thm_red},#{E:@thm_peach}}'
set -g @catppuccin_status_session_icon_bg '#{?client_prefix,#{E:@thm_red},#{E:@thm_peach}}'

# ─── Status bar layout ────────────────────────────────────────────────────────
# Helper script lives next to this file in the dotfiles repo and is copied
# to ~/.config/tmux/status-helper.sh by setup.sh.

set -g status-position bottom
set -g status-interval 5
set -g status-left-length 120
set -g status-right-length 200

# Left: session + env badge (red=prod, green=dev, yellow=other) + waiting count.
set -g status-left ''
set -ag  status-left '#{E:@catppuccin_status_session}'
set -ag  status-left '#[fg=#(~/.config/tmux/status-helper.sh env-hex),bold] #(~/.config/tmux/status-helper.sh env) '
set -ag  status-left '#[fg=#f9e2af,bold]#(~/.config/tmux/status-helper.sh waiting #S) '

# Right: git branch · wg · clock.
set -g status-right ''
set -ag status-right '#[fg=#cba6f7] #(~/.config/tmux/status-helper.sh git "#{pane_current_path}")  '
set -ag status-right '#[fg=#89dceb]#(~/.config/tmux/status-helper.sh wg)  '
set -ag status-right '#[fg=#cdd6f4]%H:%M '

# tpm bootstrap – must be the very last line.
run '~/.tmux/plugins/tpm/tpm'
