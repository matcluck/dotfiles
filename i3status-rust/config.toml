[theme]
theme = "modern"

[icons]
icons = "awesome6"

[[block]]
block = "focused_window"
format = " $title.str(max_w:40) |"

[[block]]
block = "net"
device = "auto"
interval = 2
format = " $icon $ip "
format_alt = " $icon ↓$speed_down ↑$speed_up "

[[block]]
block = "cpu"
interval = 2
format = " $icon CPU $utilization "

[[block]]
block = "memory"
format = " $icon RAM $mem_used_percents "

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
interval = 20
format = " $icon $available "

[[block]]
block = "sound"
format = " $icon $volume "

[[block]]
block = "time"
interval = 5
format = " $icon $timestamp.datetime(f:'%Y-%m-%d %H:%M') "
